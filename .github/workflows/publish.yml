name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    if: github.repository == 'vitest-dev/ivya'
    runs-on: ubuntu-latest
    permissions:
      contents: write # changelogithub creates a GitHub release
      id-token: write # npm provenance via OIDC
    environment: Release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - run: pnpm build

      - name: Publish to npm
        run: |
          releaseTag=$([[ $GITHUB_REF_NAME =~ beta ]] && echo "beta" || echo "latest")
          pnpm publish --access public --no-git-checks --tag $releaseTag

      - run: pnpm exec changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
